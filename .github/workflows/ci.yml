name: CI

# Deploy do Vercel tự lo (auto-deploy mỗi lần push). Workflow này chỉ chạy kiểm tra chất lượng
# (typecheck + test + build) để bắt lỗi trước khi Vercel build production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Lint (không chặn build)
        run: npm run lint
        continue-on-error: true
